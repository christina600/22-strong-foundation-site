name: Live site privacy audit

# Monthly check that the DEPLOYED site loads nothing from third-party
# domains. Catches things the repo can never show: Netlify dashboard
# snippet injection, a stale deploy, or a hijacked dependency that only
# manifests in production.

on:
  schedule:
    - cron: '17 14 3 * *' # 3rd of every month, 14:17 UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Audit live site for third-party resources
        run: node scripts/check-live-external.mjs https://22strongfoundation.com
