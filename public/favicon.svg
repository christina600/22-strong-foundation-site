<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
    <!-- Strong Circle mark: nine segments (nine members at $22 fund one
         session, every month) around the 22. Teal-deep on light UI,
         cream on dark UI. -->
    <circle cx="100" cy="100" r="82" stroke="#0e5a5c" stroke-width="17"
        stroke-dasharray="45.8 11.46" transform="rotate(-86 100 100)" class="mark" />
    <text x="100" y="103" text-anchor="middle" dominant-baseline="central"
        font-family="'DIN Condensed', 'DIN Alternate', 'Helvetica Neue Condensed Black', 'HelveticaNeue-CondensedBold', 'Arial Narrow', Impact, ui-sans-serif, system-ui, sans-serif"
        font-weight="900" font-size="96" letter-spacing="-2" fill="#0e5a5c" class="mark-text">22</text>
    <style>
        @media (prefers-color-scheme: dark) {
            .mark { stroke: #fffaf0; }
            .mark-text { fill: #fffaf0; }
        }
    </style>
</svg>
